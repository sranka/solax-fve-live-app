<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sun circle -->
  <circle cx="256" cy="200" r="64" fill="white"/>
  <!-- Sun rays -->
  <g stroke="white" stroke-width="10" stroke-linecap="round">
    <line x1="256" y1="110" x2="256" y2="88"/>
    <line x1="256" y1="290" x2="256" y2="312"/>
    <line x1="166" y1="200" x2="144" y2="200"/>
    <line x1="346" y1="200" x2="368" y2="200"/>
    <line x1="192" y1="136" x2="176" y2="120"/>
    <line x1="320" y1="264" x2="336" y2="280"/>
    <line x1="320" y1="136" x2="336" y2="120"/>
    <line x1="192" y1="264" x2="176" y2="280"/>
  </g>
  <!-- Solar panel -->
  <rect x="160" y="360" width="192" height="100" rx="8" fill="#5a3d0a" stroke="#5a3d0a" stroke-width="4"/>
  <line x1="208" y1="360" x2="208" y2="460" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="360" x2="256" y2="460" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="304" y1="360" x2="304" y2="460" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="393" x2="352" y2="393" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="427" x2="352" y2="427" stroke="white" stroke-width="2" opacity="0.5"/>
  <!-- Connection line sun to panel -->
  <line x1="256" y1="312" x2="256" y2="360" stroke="white" stroke-width="4" stroke-dasharray="8,6" opacity="0.6"/>
</svg>
